[pytest]
# pytest configuration for TEG Analysis test suite

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    smoke: marks tests as smoke tests
    unit: marks tests as unit tests
    data_loading: marks tests for data loading functionality
    helpers: marks tests for helper modules
    pages: marks tests for page functionality
    imports: marks tests for import verification
