<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Mockup — Round entry D · Rapid-fire flow</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
<style>
:root {
  --font-body:'Lora', Georgia, serif; --font-data:'Roboto Mono', monospace;
  --bg:#f4f3ef; --surface:#ffffff; --surface-2:#faf9f6; --text:#1a1a1a; --text-2:#555;
  --text-muted:#8c8c86; --line:#e7e5e0; --accent:forestgreen; --accent-soft:#F3F7F3; --accent-text:forestgreen;
  --bar:#ffffff; --bar-line:#e7e5e0; --shadow:0 1px 2px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.04);
  --key-bg:#ffffff; --key-active:#eef2ee; --dot-empty:#e7e5e0; --dot-filled:#8fbf98;
}
[data-theme="dark"], :root:has(#mode:checked) {
  --bg:#131311; --surface:#1d1d1a; --surface-2:#242420; --text:#ececea; --text-2:#b7b6b0;
  --text-muted:#86857e; --line:#2e2e29; --accent:#57c773; --accent-soft:#1b2a1d; --accent-text:#7ad492;
  --bar:#191916; --bar-line:#2a2a25; --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.35);
  --key-bg:#1d1d1a; --key-active:#26402a; --dot-empty:#2e2e29; --dot-filled:#3c6b46;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
html,body { margin:0; height:100%; overflow:hidden; }
body { font-family:var(--font-body); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;
  display:flex; flex-direction:column; }
.material-symbols-outlined { font-variation-settings:'opsz' 24,'wght' 400; line-height:1; vertical-align:middle; }

.appbar { flex:0 0 auto; background:var(--bar); border-bottom:1px solid var(--bar-line);
  padding:calc(10px + env(safe-area-inset-top,0)) 14px 10px; display:flex; align-items:center; gap:10px; }
.appbar .back { font-size:22px; color:var(--text-2); }
.appbar .titles { flex:1; min-width:0; }
.appbar .kicker { font-family:var(--font-data); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-muted); display:block; line-height:1.4; }
.appbar .title { font-weight:600; font-size:16px; line-height:1.15; }
.appbar .progress { font-family:var(--font-data); font-size:12px; font-weight:600; color:var(--accent-text);
  background:var(--accent-soft); border:1px solid var(--line); border-radius:999px; padding:5px 11px; white-space:nowrap; }

/* Progress map: 7 player rows x 18 hole dots. Tap any dot to jump the cursor there. */
.map { flex:0 0 auto; padding:8px 14px 6px; background:var(--surface-2); border-bottom:1px solid var(--line); }
.map .mrow { display:grid; grid-template-columns:26px repeat(18,1fr); gap:2px; margin-bottom:2px; align-items:center; }
.map .mrow:last-child { margin-bottom:0; }
.map .ml { font-family:var(--font-data); font-size:9px; font-weight:700; color:var(--text-muted); }
.map .md { height:11px; border-radius:3px; background:var(--dot-empty); }
.map .md.f { background:var(--dot-filled); }
.map .md.cur { outline:2px solid var(--accent); outline-offset:-1px; background:var(--surface); }

/* Target card: the one thing to look at. Huge, so glare/one-thumb friendly. */
.target { flex:1 1 auto; min-height:0; display:flex; align-items:center; margin:8px 14px; background:var(--surface);
  border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:10px 18px; gap:16px; }
.target .who { font-family:var(--font-data); font-size:40px; font-weight:700; color:var(--accent-text); line-height:1; }
.target .meta { flex:1; min-width:0; }
.target .meta .hole { font-size:19px; font-weight:600; line-height:1.2; }
.target .meta .sub { font-family:var(--font-data); font-size:11.5px; color:var(--text-muted); margin-top:3px; }
.target .tot { text-align:right; }
.target .tot .lab { font-family:var(--font-data); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); }
.target .tot .val { font-family:var(--font-data); font-size:24px; font-weight:700; margin-top:1px; }
.target.done { justify-content:center; }
.target.done .msg { text-align:center; font-size:17px; font-weight:600; color:var(--accent-text); }
.target.done .msg .material-symbols-outlined { font-size:34px; display:block; margin:0 auto 6px; }

/* Tape: the last few entries, newest first — the error-recovery surface. Tap a chip to re-target that cell. */
.tape { flex:0 0 auto; display:flex; align-items:center; gap:6px; padding:0 14px 6px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.tape .tlab { flex:0 0 auto; font-family:var(--font-data); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); }
.tape .tchip { flex:0 0 auto; font-family:var(--font-data); font-size:11.5px; color:var(--text-2); background:var(--surface);
  border:1px solid var(--line); border-radius:8px; padding:5px 9px; }
.tape .tchip b { color:var(--text); font-size:12.5px; }
.tape .tchip.latest { border-color:var(--accent); color:var(--accent-text); }
.tape .tchip.latest b { color:var(--accent-text); }
.tape .tempty { font-family:var(--font-data); font-size:11px; color:var(--text-muted); }

/* Giant par-relative pad: par-1..par+4 as six near-thumb-sized buttons. */
.bigpad { flex:0 0 auto; background:var(--bar); border-top:1px solid var(--bar-line); padding:8px 10px calc(8px + env(safe-area-inset-bottom,0)); }
.bigpad .prow { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px; }
.bigpad button { font-family:var(--font-data); border:1px solid var(--line); border-radius:14px; background:var(--key-bg);
  color:var(--text); box-shadow:var(--shadow); }
.bigpad button:active { background:var(--key-active); }
.bigpad button.bk { padding:11px 0 9px; display:flex; flex-direction:column; align-items:center; gap:2px; }
.bigpad button.bk .n { font-size:26px; font-weight:700; line-height:1.05; }
.bigpad button.bk .t { font-size:9px; letter-spacing:.06em; text-transform:uppercase; color:var(--text-muted); font-weight:600; }
.bigpad button.bk.ppar { border-color:var(--accent); background:var(--accent-soft); }
.bigpad button.bk.ppar .t { color:var(--accent-text); }
.bigpad button:disabled { opacity:.35; }
.bigpad .orow { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; margin-bottom:8px; }
.bigpad .orow button { font-size:14px; font-weight:600; color:var(--text-2); background:var(--surface-2); border-radius:10px; padding:10px 0; box-shadow:none; }
.bigpad .util { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.bigpad .util button { font-size:12px; font-weight:600; padding:11px 0; border-radius:11px; display:inline-flex; align-items:center; justify-content:center; gap:5px; color:var(--text-2); }
.bigpad .util button .material-symbols-outlined { font-size:17px; }
.bigpad .util button.voice { color:var(--accent-text); background:var(--accent-soft); }
.bigpad .util button.other.open { background:var(--key-active); color:var(--text); }
.bigpad .util button.undo { color:#c0392b; }

/* Voice entry (uses the OS keyboard's dictation mic on a plain textarea) */
.scrim { position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:70; }
.vsheet { position:fixed; left:0; right:0; bottom:0; z-index:71; background:var(--surface); border-top:1px solid var(--line);
  border-radius:18px 18px 0 0; box-shadow:0 -8px 30px rgba(0,0,0,.18); padding:14px 16px calc(14px + env(safe-area-inset-bottom,0)); }
.vsheet .vhead { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.vsheet .vhead .material-symbols-outlined { color:var(--accent-text); font-size:20px; }
.vsheet .vhead .tt { font-weight:600; font-size:15px; flex:1; }
.vsheet .vhead button { border:none; background:transparent; color:var(--text-muted); padding:4px; }
.vsheet .vfrom { font-family:var(--font-data); font-size:11px; color:var(--text-muted); margin-bottom:8px; }
.vsheet .vfrom b { color:var(--accent-text); }
.vsheet textarea { width:100%; min-height:64px; resize:none; font-family:var(--font-data); font-size:14px; line-height:1.5;
  color:var(--text); background:var(--surface-2); border:1px solid var(--line); border-radius:11px; padding:10px 12px;
  -webkit-user-select:text; user-select:text; }
.vsheet textarea:focus { outline:2px solid var(--accent); outline-offset:-1px; }
.vsheet .vpreview { display:flex; flex-wrap:wrap; gap:5px; margin:10px 0 0; max-height:92px; overflow-y:auto; }
.vsheet .vchip { font-family:var(--font-data); font-size:11px; background:var(--accent-soft); color:var(--accent-text);
  border:1px solid var(--line); border-radius:7px; padding:3px 7px; }
.vsheet .vchip b { font-size:12px; }
.vsheet .vchip.bad { background:transparent; color:#c0392b; border-color:#c0392b; }
.vsheet .vchip.skip { background:transparent; color:var(--text-muted); }
.vsheet .vmsg { font-family:var(--font-data); font-size:11px; color:var(--text-muted); margin:7px 0 0; min-height:14px; }
.vsheet .vmsg.err { color:#c0392b; }
.vsheet .vactions { display:flex; gap:8px; margin-top:10px; }
.vsheet .vactions button { flex:1; font-family:var(--font-data); font-size:13px; font-weight:600; border-radius:11px; padding:12px 0; border:1px solid var(--line); }
.vsheet .vactions .discard { background:var(--surface-2); color:var(--text-2); }
.vsheet .vactions .apply { background:var(--accent); border-color:var(--accent); color:#fff; }
.vsheet .vactions .apply:disabled { opacity:.4; }

.demobar { position:fixed; top:calc(8px + env(safe-area-inset-top,0)); right:10px; z-index:60; }
.demobar label { background:var(--surface); color:var(--text-2); border:1px solid var(--line); border-radius:999px;
  padding:6px 10px; font-family:var(--font-data); font-size:11px; cursor:pointer; box-shadow:var(--shadow); display:inline-flex; align-items:center; gap:5px; }
.demobar .material-symbols-outlined { font-size:16px; }
</style>
</head>
<body>
<div class="demobar"><label><input type="checkbox" id="mode" hidden><span class="material-symbols-outlined">contrast</span>Light / Dark</label></div>

<header class="appbar">
  <span class="material-symbols-outlined back">arrow_back_ios_new</span>
  <div class="titles"><span class="kicker">TEG 50 &middot; Round 1</span><div class="title">Enter scores &mdash; flow</div></div>
  <span class="progress" id="progress">0 / 126</span>
</header>

<div class="map" id="map"></div>

<div class="target" id="target"></div>

<div class="tape" id="tape"></div>

<div class="bigpad" id="bigpad"></div>

<div class="scrim" id="v-scrim" hidden></div>
<div class="vsheet" id="v-sheet" hidden>
  <div class="vhead"><span class="material-symbols-outlined">mic</span><div class="tt">Voice entry</div>
    <button id="v-close"><span class="material-symbols-outlined">close</span></button></div>
  <div class="vfrom">Fills from <b id="v-from">&hellip;</b> onwards, one player&rsquo;s card at a time</div>
  <textarea id="v-input" placeholder="Tap here, then use your keyboard&rsquo;s mic to dictate scores in order &mdash; e.g. &ldquo;four five 3 seven ten four&rdquo;"></textarea>
  <div class="vpreview" id="v-preview"></div>
  <div class="vmsg" id="v-msg"></div>
  <div class="vactions">
    <button class="discard" id="v-discard">Discard</button>
    <button class="apply" id="v-apply" disabled>Nothing to fill yet</button>
  </div>
</div>

<script>
const PLAYERS = ['DM','GW','HM','JP','JB','SN','AB'];
const PARS = [4,3,5,4,4,3,5,4,4, 4,4,3,5,4,3,4,5,4];
const SIS  = [7,13,1,17,9,15,3,11,5, 8,14,2,18,10,16,4,12,6];

let scores = {};             // "player-hole" -> score
let target = { p: PLAYERS[0], h: 1 };
let undoStack = [];          // { p, h, prev }
let showOther = false;

function key(p, h) { return p + '-' + h; }
function filledCount() { return Object.keys(scores).length; }
function playerTotal(p) {
  let t = 0, n = 0;
  for (let h = 1; h <= 18; h++) { const v = scores[key(p, h)]; if (v !== undefined) { t += v; n++; } }
  return { total: t, holes: n };
}

// Flow order is player-major (DM holes 1-18, then GW, ...) — the order you read a
// paper card — and always advances to the NEXT EMPTY cell, so jumps and undos never
// cause silent overwrites downstream.
function cellSeq() {
  const seq = [];
  for (const p of PLAYERS) for (let h = 1; h <= 18; h++) seq.push({ p, h });
  return seq;
}
function nextEmptyAfter(p, h) {
  const seq = cellSeq();
  const idx = seq.findIndex(c => c.p === p && c.h === h);
  for (let i = 1; i <= seq.length; i++) {
    const c = seq[(idx + i) % seq.length];
    if (scores[key(c.p, c.h)] === undefined) return c;
  }
  return null;
}
function firstEmpty() {
  for (const c of cellSeq()) if (scores[key(c.p, c.h)] === undefined) return c;
  return null;
}

// Par-relative pad: primary = par-1..par+4 (97.8% of every score in the data —
// eagles are 0.06%, par+4 is 3.7%, so the range skews high); par sits at a fixed
// 2nd position for muscle memory. "Other" reveals the remaining 1-12.
function relTerm(score, par) {
  if (score === 1) return 'ace';
  const d = score - par;
  if (d === -2) return 'eagle';
  if (d === -1) return 'birdie';
  if (d === 0) return 'par';
  if (d === 1) return 'bogey';
  return (d > 0 ? '+' : '') + d;
}
function parKeypadValues(par) {
  const lo = Math.max(1, par - 1);
  const primary = [];
  for (let v = lo; v <= lo + 5; v++) primary.push(v);
  const outliers = [];
  for (let v = 1; v <= 12; v++) if (v < lo || v > lo + 5) outliers.push(v);
  return { primary, outliers };
}

function render() {
  renderMap();
  renderTarget();
  renderTape();
  renderPad();
  document.getElementById('progress').textContent = `${filledCount()} / ${PLAYERS.length * 18}`;
}

function renderMap() {
  const map = document.getElementById('map');
  map.innerHTML = PLAYERS.map(p =>
    `<div class="mrow"><span class="ml">${p}</span>` +
    [...Array(18)].map((_, i) => {
      const h = i + 1;
      const f = scores[key(p, h)] !== undefined;
      const cur = target && target.p === p && target.h === h;
      return `<div class="md${f ? ' f' : ''}${cur ? ' cur' : ''}" data-p="${p}" data-h="${h}"></div>`;
    }).join('') + '</div>').join('');
  map.querySelectorAll('.md').forEach(d => {
    d.addEventListener('click', () => { target = { p: d.dataset.p, h: parseInt(d.dataset.h) }; render(); });
  });
}

function renderTarget() {
  const el = document.getElementById('target');
  if (!target) {
    el.className = 'target done';
    el.innerHTML = `<div class="msg"><span class="material-symbols-outlined">check_circle</span>All 126 scores entered.<br>Check the map, then submit.</div>`;
    return;
  }
  el.className = 'target';
  const par = PARS[target.h - 1], si = SIS[target.h - 1];
  const pt = playerTotal(target.p);
  const cur = scores[key(target.p, target.h)];
  el.innerHTML = `
    <div class="who">${target.p}</div>
    <div class="meta">
      <div class="hole">Hole ${target.h} &middot; Par ${par}</div>
      <div class="sub">SI ${si}${cur !== undefined ? ` &middot; currently ${cur} — tap to replace` : ''}</div>
    </div>
    <div class="tot"><div class="lab">${target.p} total</div><div class="val">${pt.holes ? pt.total : '–'}</div></div>`;
}

function renderTape() {
  const tape = document.getElementById('tape');
  const recent = undoStack.slice(-8).reverse();
  tape.innerHTML = '<span class="tlab">Last</span>' + (recent.length
    ? recent.map((e, i) =>
        `<button class="tchip${i === 0 ? ' latest' : ''}" data-p="${e.p}" data-h="${e.h}">${e.p} H${e.h} <b>${scores[key(e.p, e.h)] ?? '–'}</b></button>`).join('')
    : '<span class="tempty">nothing entered yet</span>');
  tape.querySelectorAll('.tchip').forEach(c => {
    c.addEventListener('click', () => { target = { p: c.dataset.p, h: parseInt(c.dataset.h) }; render(); });
  });
}

function renderPad() {
  const pad = document.getElementById('bigpad');
  if (!target) {
    pad.innerHTML = `<div class="util"><button class="undo" id="k-undo"><span class="material-symbols-outlined">undo</span>Undo</button>
      <button class="voice" id="k-voice" disabled><span class="material-symbols-outlined">mic</span>Voice</button>
      <button class="other" disabled>Other&hellip;</button></div>`;
    pad.querySelector('#k-undo').addEventListener('click', undo);
    return;
  }
  const par = PARS[target.h - 1];
  const { primary, outliers } = parKeypadValues(par);
  pad.innerHTML =
    `<div class="prow">${primary.slice(0, 3).map(v => bigBtn(v, par)).join('')}</div>` +
    `<div class="prow">${primary.slice(3).map(v => bigBtn(v, par)).join('')}</div>` +
    (showOther ? `<div class="orow">${outliers.map(v => `<button data-v="${v}">${v}</button>`).join('')}</div>` : '') +
    `<div class="util">
      <button class="undo" id="k-undo"${undoStack.length ? '' : ' disabled'}><span class="material-symbols-outlined">undo</span>Undo</button>
      <button class="voice" id="k-voice"><span class="material-symbols-outlined">mic</span>Voice</button>
      <button class="other${showOther ? ' open' : ''}" id="k-other">Other&hellip;</button>
    </div>`;
  pad.querySelectorAll('button[data-v]').forEach(b => b.addEventListener('click', () => enter(parseInt(b.dataset.v))));
  pad.querySelector('#k-undo').addEventListener('click', undo);
  pad.querySelector('#k-voice').addEventListener('click', openVoice);
  pad.querySelector('#k-other').addEventListener('click', () => { showOther = !showOther; renderPad(); });
}
function bigBtn(v, par) {
  return `<button class="bk${v === par ? ' ppar' : ''}" data-v="${v}"><span class="n">${v}</span><span class="t">${relTerm(v, par)}</span></button>`;
}

function enter(v) {
  if (!target) return;
  undoStack.push({ p: target.p, h: target.h, prev: scores[key(target.p, target.h)] });
  scores[key(target.p, target.h)] = v;
  showOther = false;
  target = nextEmptyAfter(target.p, target.h);
  render();
}

function undo() {
  const e = undoStack.pop();
  if (!e) return;
  if (e.prev === undefined) delete scores[key(e.p, e.h)];
  else scores[key(e.p, e.h)] = e.prev;
  target = { p: e.p, h: e.h };
  render();
}

// ---------- Voice entry ----------
// iOS Safari has no reliable Web Speech API, but the OS keyboard's dictation mic
// works on any plain text field. So: open a sheet with a textarea, let the user
// dictate into it with the keyboard mic, parse whatever text lands, preview the
// cell-by-cell mapping, and only commit on an explicit Apply. Fills empty cells
// forward from the cursor in flow order — the preview shows the player code on
// every chip, so a run that crosses into the next player's card is visible.
const NUM_WORDS = {
  zero:0, oh:0, one:1, won:1, wan:1, two:2, to:2, too:2, three:3, tree:3, free:3, thee:3,
  four:4, for:4, fore:4, five:5, fife:5, six:6, sicks:6, seven:7, eight:8, ate:8, aid:8,
  nine:9, nein:9, ten:10, tin:10, tan:10, eleven:11, twelve:12,
  thirteen:13, fourteen:14, fifteen:15, sixteen:16, seventeen:17, eighteen:18, nineteen:19, twenty:20
};
const FILLER_WORDS = new Set(['and','then','uh','um','er','a','the','hole','next']);

function parseDictation(text) {
  const tokens = text.toLowerCase().replace(/[,.;:!?…'"‘’“”/\\-]+/g, ' ').split(/\s+/).filter(Boolean);
  const values = [];
  const unknown = [];
  for (const tok of tokens) {
    if (/^\d+$/.test(tok)) {
      if (tok.length <= 2 && +tok >= 1 && +tok <= 12) { values.push(+tok); continue; }
      // Dictation often glues a spoken run into one number ("three four ten" -> "3410").
      // Split it digit-by-digit, reading "1" followed by 0-2 as 10-12 (a 10+ blow-up
      // is far likelier here than a hole-in-one followed by a low score).
      let i = 0;
      while (i < tok.length) {
        if (tok[i] === '1' && i + 1 < tok.length && '012'.includes(tok[i + 1])) { values.push(+tok.substr(i, 2)); i += 2; }
        else { values.push(+tok[i]); i += 1; }
      }
      continue;
    }
    if (tok in NUM_WORDS) { values.push(NUM_WORDS[tok]); continue; }
    if (!FILLER_WORDS.has(tok)) unknown.push(tok);
  }
  return { values, unknown, bad: values.filter(v => v < 1 || v > 12) };
}

function voiceTargets(count) {
  if (!target || count < 1) return [];
  const seq = [target];
  while (seq.length < count) {
    const last = seq[seq.length - 1];
    const nxt = nextEmptyAfterExcluding(last, seq);
    if (!nxt) break;
    seq.push(nxt);
  }
  return seq;
}
// Like nextEmptyAfter, but cells already claimed earlier in this dictation count as full.
function nextEmptyAfterExcluding(from, claimed) {
  const seq = cellSeq();
  const idx = seq.findIndex(c => c.p === from.p && c.h === from.h);
  for (let i = 1; i <= seq.length; i++) {
    const c = seq[(idx + i) % seq.length];
    if (scores[key(c.p, c.h)] !== undefined) continue;
    if (claimed.some(x => x.p === c.p && x.h === c.h)) continue;
    return c;
  }
  return null;
}

function updateVoicePreview() {
  const res = parseDictation(document.getElementById('v-input').value);
  const targets = voiceTargets(res.values.length);
  const chips = res.values.map((v, i) => {
    if (v < 1 || v > 12) return `<span class="vchip bad">${v} &#10005;</span>`;
    if (i >= targets.length) return `<span class="vchip skip">${v} &middot; no cell</span>`;
    const t = targets[i];
    return `<span class="vchip">${t.p} H${t.h} <b>${v}</b></span>`;
  });
  document.getElementById('v-preview').innerHTML = chips.join('');
  const msg = document.getElementById('v-msg');
  const apply = document.getElementById('v-apply');
  const n = Math.min(res.values.length, targets.length);
  if (res.unknown.length) {
    msg.className = 'vmsg err';
    msg.textContent = `Didn't understand: "${res.unknown.join('", "')}" — edit the text above.`;
    apply.disabled = true; apply.textContent = 'Fix before filling';
  } else if (res.bad.length) {
    msg.className = 'vmsg err';
    msg.textContent = 'Scores must be 1–12 — edit the marked values.';
    apply.disabled = true; apply.textContent = 'Fix before filling';
  } else {
    msg.className = 'vmsg';
    msg.textContent = res.values.length > targets.length ? `Only ${targets.length} empty cells left — extra values ignored.` : '';
    apply.disabled = n === 0;
    apply.textContent = n === 0 ? 'Nothing to fill yet' : `Fill ${n} score${n === 1 ? '' : 's'}`;
  }
}

function openVoice() {
  if (!target) return;
  document.getElementById('v-from').textContent = `${target.p} · Hole ${target.h}`;
  document.getElementById('v-input').value = '';
  document.getElementById('v-scrim').hidden = false;
  document.getElementById('v-sheet').hidden = false;
  updateVoicePreview();
  document.getElementById('v-input').focus();
}

function closeVoice() {
  document.getElementById('v-scrim').hidden = true;
  document.getElementById('v-sheet').hidden = true;
}

function applyVoice() {
  const res = parseDictation(document.getElementById('v-input').value);
  if (res.unknown.length || res.bad.length) return;
  const targets = voiceTargets(res.values.length);
  const n = Math.min(res.values.length, targets.length);
  if (!n) return;
  for (let i = 0; i < n; i++) {
    const t = targets[i];
    undoStack.push({ p: t.p, h: t.h, prev: scores[key(t.p, t.h)] });
    scores[key(t.p, t.h)] = res.values[i];
  }
  const last = targets[n - 1];
  target = nextEmptyAfter(last.p, last.h);
  closeVoice();
  render();
}

document.getElementById('v-close').addEventListener('click', closeVoice);
document.getElementById('v-discard').addEventListener('click', closeVoice);
document.getElementById('v-scrim').addEventListener('click', closeVoice);
document.getElementById('v-apply').addEventListener('click', applyVoice);
document.getElementById('v-input').addEventListener('input', updateVoicePreview);

render();
</script>
</body>
</html>
