{% extends "base.html" %}

{% block page_title %}
<div class="page-title-area">
    <span class="page-label">History</span>
    <h1 class="page-title">TEG Honours Board</h1>
</div>
{% endblock %}

{% block content %}

<!-- Tab bar -->
<div class="section-nav">
    {% for tab_id, tab_label in tabs %}
    <button class="tab-underline{% if tab_id == active_tab %} tab-underline--active{% endif %}"
            hx-get="/honours/tab/{{ tab_id }}"
            hx-target="#honours-content"
            hx-swap="innerHTML"
            onclick="
                document.querySelectorAll('.section-nav button.tab-underline').forEach(b => b.classList.remove('tab-underline--active'));
                this.classList.add('tab-underline--active');
            ">
        {{ tab_label }}
    </button>
    {% endfor %}
</div>

<div id="honours-content" class="section-panel">
    {% include "partials/honours_tab.html" %}
</div>
{% endblock %}
