{% if error %}
<div class="error-box">{{ error }}</div>
{% else %}
<div class="card">
    <h2 class="text-lg subheading mb-2">{{ chart_title }}</h2>
    <div id="plotly-chart" style="width:100%; height:500px;"></div>
    <script>
        (function() {
            var figData = {{ figure_json | safe }};
            Plotly.newPlot('plotly-chart', figData.data, figData.layout, {responsive: true, displayModeBar: false});
        })();
    </script>
    {% if chart_description %}
    <p class="chart-description">{{ chart_description }}</p>
    {% endif %}
</div>
{% endif %}
