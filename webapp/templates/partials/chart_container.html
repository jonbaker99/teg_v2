{% if error %}
<div class="bg-red-50 text-red-700 p-4 rounded-md">{{ error }}</div>
{% else %}
<div class="bg-white rounded-lg shadow p-4">
    <h2 class="text-lg font-semibold text-gray-700 mb-2">{{ chart_title }}</h2>
    <div id="plotly-chart" style="width:100%; height:500px;"></div>
    <script>
        (function() {
            var figData = {{ figure_json | safe }};
            Plotly.newPlot('plotly-chart', figData.data, figData.layout, {responsive: true, displayModeBar: false});
        })();
    </script>
</div>
{% endif %}
