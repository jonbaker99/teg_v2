{% if error %}
  <tr><td colspan="5" class="error" style="color:#b00020;">{{ error }}</td></tr>
{% elif resolved %}
  <tr><td colspan="5" style="color:#1a1a1a;">✅ Hole {{ resolved.hole }}, {{ resolved.player }} confirmed as {{ resolved.value }}. Reload the page once every conflict is resolved to enable Finalize.</td></tr>
{% endif %}
