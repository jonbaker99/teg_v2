{% if error %}
<p class="text-muted">Error: {{ error }}</p>
{% else %}
{% set inc = "#ch-teg, #ch-across, #ch-rows, #ch-tab" %}
<div class="section-controls flex flex-wrap items-end gap-4">
    <label class="flex flex-col text-sm gap-1">
        <span class="text-muted">TEG</span>
        <select class="theme-select" id="ch-teg" name="teg"
                hx-get="/scoring/changes/content" hx-target="#changes"
                hx-include="{{ inc }}" hx-swap="innerHTML">
            {% for t in teg_options %}
            <option value="{{ t }}" {% if t == selected_teg %}selected{% endif %}>{% if t == 'All TEGs' %}All TEGs{% else %}TEG {{ t }}{% endif %}</option>
            {% endfor %}
        </select>
    </label>
    <label class="flex flex-col text-sm gap-1">
        <span class="text-muted">Include changes across TEGs?</span>
        <select class="theme-select" id="ch-across" name="across"
                hx-get="/scoring/changes/content" hx-target="#changes"
                hx-include="{{ inc }}" hx-swap="innerHTML">
            <option value="within" {% if across == 'within' %}selected{% endif %}>No</option>
            <option value="across" {% if across == 'across' %}selected{% endif %}>Yes</option>
        </select>
    </label>
    <label class="flex flex-col text-sm gap-1">
        <span class="text-muted">Rounds to show</span>
        <select class="theme-select" id="ch-rows" name="rows"
                hx-get="/scoring/changes/content" hx-target="#changes"
                hx-include="{{ inc }}" hx-swap="innerHTML">
            <option value="top" {% if rows == 'top' %}selected{% endif %}>Top {{ top_n }}</option>
            <option value="all" {% if rows == 'all' %}selected{% endif %}>All</option>
        </select>
    </label>
</div>

<input type="hidden" id="ch-tab" name="tab" value="{{ active_tab }}">
<div class="section-nav">
    {% for tab_id, tab_label in tabs %}
    <button class="tab-underline{% if tab_id == active_tab %} tab-underline--active{% endif %}"
            hx-get="/scoring/changes/content" hx-target="#changes" hx-swap="innerHTML"
            hx-include="#ch-teg, #ch-across, #ch-rows"
            hx-vals='{"tab": "{{ tab_id }}"}'>
        {{ tab_label }}
    </button>
    {% endfor %}
</div>

<div class="data-card"><div class="table-wrapper">{{ table_html | safe }}</div></div>
{% endif %}
