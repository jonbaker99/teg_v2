{% if error %}
<p class="text-muted">Error: {{ error }}</p>
{% else %}
{% set common = {"hx-get": "/scoring/all-rounds/content", "hx-target": "#all-rounds",
                 "hx-include": "#ar-area, #ar-course, #ar-player, #ar-measure, #ar-n", "hx-swap": "innerHTML"} %}
<div class="flex flex-wrap items-end gap-4 mb-4">
    <label class="flex flex-col text-sm gap-1">
        <span class="text-muted">Area</span>
        <select class="theme-select" id="ar-area" name="area"
                hx-get="/scoring/all-rounds/content" hx-target="#all-rounds"
                hx-include="#ar-measure, #ar-n" hx-swap="innerHTML">
            {% for a in areas %}<option value="{{ a }}" {% if a == selected_area %}selected{% endif %}>{{ a }}</option>{% endfor %}
        </select>
    </label>
    <label class="flex flex-col text-sm gap-1">
        <span class="text-muted">Course</span>
        <select class="theme-select" id="ar-course" name="course"
                hx-get="/scoring/all-rounds/content" hx-target="#all-rounds"
                hx-include="#ar-area, #ar-measure, #ar-n" hx-swap="innerHTML">
            {% for ccourse in courses %}<option value="{{ ccourse }}" {% if ccourse == selected_course %}selected{% endif %}>{{ ccourse }}</option>{% endfor %}
        </select>
    </label>
    <label class="flex flex-col text-sm gap-1">
        <span class="text-muted">Player</span>
        <select class="theme-select" id="ar-player" name="player"
                hx-get="/scoring/all-rounds/content" hx-target="#all-rounds"
                hx-include="#ar-area, #ar-course, #ar-measure, #ar-n" hx-swap="innerHTML">
            {% for p in players %}<option value="{{ p }}" {% if p == selected_player %}selected{% endif %}>{{ p }}</option>{% endfor %}
        </select>
    </label>
    <label class="flex flex-col text-sm gap-1">
        <span class="text-muted">Measure</span>
        <select class="theme-select" id="ar-measure" name="measure"
                hx-get="/scoring/all-rounds/content" hx-target="#all-rounds"
                hx-include="#ar-area, #ar-course, #ar-player, #ar-n" hx-swap="innerHTML">
            {% for mid, mlabel in measures %}<option value="{{ mid }}" {% if mid == selected_measure %}selected{% endif %}>{{ mlabel }}</option>{% endfor %}
        </select>
    </label>
    <label class="flex flex-col text-sm gap-1">
        <span class="text-muted">Rounds to show</span>
        <input class="theme-select" type="number" min="1" max="100" step="1" style="width: 5rem;"
               id="ar-n" name="n" value="{{ n_records }}"
               hx-get="/scoring/all-rounds/content" hx-target="#all-rounds"
               hx-include="#ar-area, #ar-course, #ar-player, #ar-measure"
               hx-trigger="change, keyup changed delay:500ms" hx-swap="innerHTML">
    </label>
</div>

<h2 class="section-title">{{ result_title }}</h2>
{{ table_html | safe }}
{% endif %}
