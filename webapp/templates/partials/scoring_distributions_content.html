{% if error %}
<p class="text-muted">Error: {{ error }}</p>
{% else %}
{% set inc = "#di-field, #di-player, #di-teg, #di-par, #di-mode, #di-tab" %}
<div class="section-controls flex flex-wrap items-end gap-4">
    <label class="flex flex-col text-sm gap-1"><span class="text-muted">Score type</span>
        <select class="theme-select" id="di-field" name="field"
                hx-get="/scoring/distributions/content" hx-target="#distributions" hx-include="{{ inc }}" hx-swap="innerHTML">
            {% for fid, flabel in fields %}<option value="{{ fid }}" {% if fid == selected_field %}selected{% endif %}>{{ flabel }}</option>{% endfor %}
        </select>
    </label>
    <label class="flex flex-col text-sm gap-1"><span class="text-muted">Player</span>
        <select class="theme-select" id="di-player" name="player"
                hx-get="/scoring/distributions/content" hx-target="#distributions" hx-include="{{ inc }}" hx-swap="innerHTML">
            {% for p in player_options %}<option value="{{ p }}" {% if p == selected_player %}selected{% endif %}>{{ p }}</option>{% endfor %}
        </select>
    </label>
    <label class="flex flex-col text-sm gap-1"><span class="text-muted">TEG</span>
        <select class="theme-select" id="di-teg" name="teg"
                hx-get="/scoring/distributions/content" hx-target="#distributions" hx-include="{{ inc }}" hx-swap="innerHTML">
            {% for t in teg_options %}<option value="{{ t }}" {% if t == selected_teg %}selected{% endif %}>{% if t == 'All TEGs' %}All TEGs{% else %}TEG {{ t }}{% endif %}</option>{% endfor %}
        </select>
    </label>
    <label class="flex flex-col text-sm gap-1"><span class="text-muted">Par</span>
        <select class="theme-select" id="di-par" name="par"
                hx-get="/scoring/distributions/content" hx-target="#distributions" hx-include="{{ inc }}" hx-swap="innerHTML">
            {% for p in par_options %}<option value="{{ p }}" {% if p == selected_par %}selected{% endif %}>{{ p }}</option>{% endfor %}
        </select>
    </label>
    <label class="flex flex-col text-sm gap-1"><span class="text-muted">Display</span>
        <select class="theme-select" id="di-mode" name="mode"
                hx-get="/scoring/distributions/content" hx-target="#distributions" hx-include="{{ inc }}" hx-swap="innerHTML">
            <option value="Percentage" {% if mode == 'Percentage' %}selected{% endif %}>Percentage</option>
            <option value="Count" {% if mode == 'Count' %}selected{% endif %}>Count</option>
        </select>
    </label>
</div>

<input type="hidden" id="di-tab" name="tab" value="{{ active_tab }}">
<div class="section-nav">
    {% for tab_id, tab_label in tabs %}
    <button class="tab-underline{% if tab_id == active_tab %} tab-underline--active{% endif %}"
            hx-get="/scoring/distributions/content" hx-target="#distributions" hx-swap="innerHTML"
            hx-include="#di-field, #di-player, #di-teg, #di-par, #di-mode"
            hx-vals='{"tab": "{{ tab_id }}"}'>
        {{ tab_label }}
    </button>
    {% endfor %}
</div>

{% if chart_json %}
<div class="data-card data-card--padded section-gap">
    <div id="dist-chart" class="chart-container" style="height:350px;"></div>
</div>
<script>
(function() {
    var data = {{ chart_json | safe }};
    drawPlot('dist-chart', data);
})();
</script>
{% endif %}

<div class="data-card"><div class="table-wrapper">{{ table_html | safe }}</div></div>
{% endif %}
