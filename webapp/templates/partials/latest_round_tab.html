{% if error %}
<p class="text-muted">Error: {{ error }}</p>
{% elif sections %}
  {% for section in sections %}
    {% if section.title %}<div class="card-header">{{ section.title }}</div>{% endif %}
    <div class="data-card"><div style="overflow-x: auto;">{{ section.table_html | safe }}</div></div>
  {% endfor %}
{% else %}
<p class="text-muted text-sm">No data available.</p>
{% endif %}
