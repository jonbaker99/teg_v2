{% if error %}
<p class="text-muted">Error: {{ error }}</p>
{% else %}
{% if chart_json %}
{% if result_title %}<div class="card-header">{{ result_title }}</div>{% endif %}
<div class="data-card data-card--padded">
    <div id="results-chart" style="width:100%; height:350px;"></div>
    <script>
    (function() {
        var data = {{ chart_json | safe }};
        Plotly.newPlot('results-chart', data.data, data.layout, {displayModeBar: false, responsive: true});
    })();
    </script>
</div>
<div class="data-card">
    <div style="overflow-x: auto;">{{ table_html | safe }}</div>
</div>
{% else %}
{% if result_title %}<div class="card-header">{{ result_title }}</div>{% endif %}
<div class="data-card">
    <div style="overflow-x: auto;">{{ table_html | safe }}</div>
</div>
{% endif %}
{% endif %}
