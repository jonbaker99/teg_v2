{% if error %}
<div class="error-box">{{ error }}</div>
{% else %}
<div class="space-y-6">
    {% for section in sections %}
    <div>
        <h2 class="text-lg subheading mb-2">
            {{ section.title }}
            {% if section.record_count is defined and section.record_count %}
            <span class="badge-muted">{{ section.record_count }}</span>
            {% endif %}
        </h2>
        <div class="overflow-x-auto">
            {{ section.table_html | safe }}
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
