{% if error %}
<div class="error-box">{{ error }}</div>
{% else %}
<div>
    {% for section in sections %}
    {% if not loop.first %}
    <hr class="divider--dotted">
    {% endif %}
    <div>
        <h2 class="text-xl heading mb-3">{{ section.title }}</h2>
        <div class="overflow-x-auto">
            {{ section.table_html | safe }}
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
