{% if error %}
<div class="error-box">{{ error }}</div>
{% else %}
<div>
    {% for section in sections %}
    {% if not loop.first %}
    <hr class="divider--dotted">
    {% endif %}
    <div>
        <h2 class="section-title">{{ section.title }}</h2>
        <div class="data-card"><div class="overflow-x-auto">
            {{ section.table_html | safe }}
        </div></div>
    </div>
    {% endfor %}
    {% if caption %}
    <p class="text-muted text-sm mt-3">{{ caption }}</p>
    {% endif %}
</div>
{% endif %}
