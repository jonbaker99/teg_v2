<div>
    {% if rounds_chart_json %}
    <div class="pp-section">
        <span class="pp-label">Gross vs Par by round</span>
        <p class="pp-note">Each bar is one round, coloured by score (green = better) and grouped by TEG.</p>
        <div class="chart-container" data-figure="{{ rounds_chart_json }}" style="height:320px; margin-top:0.9rem;"></div>
    </div>
    {% endif %}

    <div class="pp-section">
        <span class="pp-label">All rounds</span>
        <p class="pp-note">* = personal best</p>
        <div class="overflow-x-auto">{{ rounds_table_html | safe }}</div>
    </div>
</div>
