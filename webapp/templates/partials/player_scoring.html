<div>
    {% for section in sections %}
    <div class="pp-section">
        <span class="pp-label">{{ section.title }}</span>
        {% if section.table_html %}
        <div class="overflow-x-auto">{{ section.table_html | safe }}</div>
        {% endif %}
        {% if section.chart_json %}
        <div class="chart-container" data-figure="{{ section.chart_json }}" style="height:350px; margin-top:0.9rem;"></div>
        {% endif %}
    </div>
    {% endfor %}
</div>
