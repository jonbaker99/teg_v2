<div>
    {% for section in sections %}
    {% if not loop.first %}
    <hr class="divider--dotted my-6">
    {% endif %}
    <div>
        <h2 class="section-title">{{ section.title }}</h2>
        {% if section.table_html %}
        <div class="data-card"><div class="overflow-x-auto">
            {{ section.table_html | safe }}
        </div></div>
        {% endif %}
        {% if section.chart_json %}
        <div class="data-card data-card--padded">
            <div id="scoring-chart-{{ loop.index }}" class="chart-container" style="height:350px;"></div>
            <script>
                (function() {
                    var figData = {{ section.chart_json | safe }};
                    Plotly.newPlot('scoring-chart-{{ loop.index }}', figData.data, figData.layout, {responsive: true, displayModeBar: false});
                })();
            </script>
        </div>
        {% endif %}
    </div>
    {% endfor %}
</div>
