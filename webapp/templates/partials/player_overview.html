<div>
    <h2 class="text-xl heading mb-3">TEG Results</h2>
    <div class="overflow-x-auto">
        {{ teg_table_html | safe }}
    </div>

    {% if chart_json %}
    <hr class="divider--dotted my-6">
    <h2 class="text-xl heading mb-3">Career Trend — Gross vs Par</h2>
    <div class="card">
        <div id="player-overview-chart" style="width:100%; height:400px;"></div>
        <script>
            (function() {
                var figData = {{ chart_json | safe }};
                Plotly.newPlot('player-overview-chart', figData.data, figData.layout, {responsive: true, displayModeBar: false});
            })();
        </script>
    </div>
    {% endif %}
</div>
