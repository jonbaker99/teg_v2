{% extends "base.html" %}

{% block page_title %}
<div class="page-title-area">
    <span class="page-label">Scorecards</span>
    <h1 class="page-title">Eclectic Records</h1>
</div>
{% endblock %}

{% block content %}

<div class="section-nav">
    {% for tab_id, tab_label in tabs %}
    <button class="tab-underline{% if tab_id == active_tab %} tab-underline--active{% endif %}"
            hx-get="/eclectic-records/tab?dimension={{ tab_id }}"
            hx-target="#eclectic-records-content"
            hx-swap="innerHTML">
        {{ tab_label }}
    </button>
    {% endfor %}
</div>

<div id="eclectic-records-content" class="section-panel">
    {% include "partials/eclectic_records_tab.html" %}
</div>
{% endblock %}
