{% extends "base.html" %}

{% block page_title %}
<div class="page-title-area">
    <span class="page-label">{{ section|default('') }}</span>
    <h1 class="page-title">{{ title }}</h1>
</div>
{% endblock %}

{% block content %}
{% if subtitle %}<p class="page-subtitle">{{ subtitle }}</p>{% endif %}
<div style="padding: 3rem 0; text-align: center;">
    <p style="font-size: 1.1rem; opacity: 0.6;">Coming soon</p>
    {% if note %}<p style="font-size: 0.85rem; opacity: 0.4; margin-top: 0.5rem;">{{ note }}</p>{% endif %}
</div>
{% endblock %}
