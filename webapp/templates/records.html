{% extends "base.html" %}
{% block title_suffix %} — Records{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Records</h1>

<!-- Tab buttons -->
<div class="flex flex-wrap gap-1 mb-4 border-b border-gray-200 pb-2">
    {% for tab_id, tab_label in tabs %}
    <button class="px-4 py-2 rounded-t text-sm font-medium
                   {% if tab_id == active_tab %}bg-green-700 text-white{% else %}bg-gray-100 text-gray-600 hover:bg-green-50{% endif %}"
            hx-get="/records/tab/{{ tab_id }}"
            hx-target="#tab-content"
            hx-indicator="#records-loading">
        {{ tab_label }}
    </button>
    {% endfor %}
    <span id="records-loading" class="htmx-indicator ml-2 self-center">
        <svg class="animate-spin h-5 w-5 text-green-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
    </span>
</div>

<div id="tab-content">
    {% include "partials/records_tab.html" %}
</div>
{% endblock %}
