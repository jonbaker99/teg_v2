{% extends "base.html" %}

{% block page_title %}
<div class="page-title-area">
    <span class="page-label">Scoring</span>
    <h1 class="page-title">Average by TEG</h1>
</div>
{% endblock %}

{% block content %}
<p class="page-subtitle">Gross vs par by TEG and player</p>

{% if chart_json %}
<div class="data-card data-card--padded section-gap">
    <div class="chart-container" data-figure="{{ chart_json }}" style="height:350px;"></div>
</div>
{% endif %}

<div class="data-card"><div class="table-wrapper">{{ table_html | safe }}</div></div>
{% endblock %}
