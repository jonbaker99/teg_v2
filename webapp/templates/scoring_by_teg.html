{% extends "base.html" %}
{% block content %}
<h1 class="page-title">Average by TEG</h1>
<p class="page-subtitle">Gross vs par by TEG and player</p>

{% if chart_json %}
<div id="by-teg-chart" style="width:100%; height:350px; margin-bottom:1.5rem;"></div>
<script>
(function() {
    var data = {{ chart_json | safe }};
    Plotly.newPlot('by-teg-chart', data.data, data.layout, {displayModeBar: false, responsive: true});
})();
</script>
{% endif %}

{{ table_html | safe }}
{% endblock %}
