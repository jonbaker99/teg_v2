<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEG Stats{% block title_suffix %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <link rel="stylesheet" href="/static/themes/base-vars.css">
    <link rel="stylesheet" href="/static/themes/{{ request.state.theme }}.css">
    {% block extra_head %}{% endblock %}
</head>
<body class="page-bg">
    <!-- Navigation -->
    <nav class="nav">
        <div class="px-6">
            <div class="flex items-center justify-between h-14">
                <a href="/" class="nav-brand">The El Golfo</a>
                <div class="flex items-center space-x-1">
                    <a href="/leaderboard"
                       class="nav-link {% if active_page == 'leaderboard' %}active{% endif %}">
                        Leaderboard
                    </a>
                    <a href="/charts"
                       class="nav-link {% if active_page == 'charts' %}active{% endif %}">
                        Charts
                    </a>
                    <a href="/scorecard"
                       class="nav-link {% if active_page == 'scorecard' %}active{% endif %}">
                        Scorecard
                    </a>
                    <a href="/records"
                       class="nav-link {% if active_page == 'records' %}active{% endif %}">
                        Records
                    </a>
                    <a href="/player/JB"
                       class="nav-link {% if active_page == 'player' %}active{% endif %}">
                        Players
                    </a>
                    <a href="/showcase"
                       class="nav-link {% if active_page == 'showcase' %}active{% endif %}">
                        Showcase
                    </a>
                    <select class="theme-select ml-3"
                            onchange="document.cookie='theme='+this.value+';path=/;max-age=31536000';location.reload()">
                        {% for tid, tlabel in request.state.themes %}
                        <option value="{{ tid }}" {% if tid == request.state.theme %}selected{% endif %}>{{ tlabel }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="main-content {% block main_class %}max-w-3xl{% endblock %} mx-auto px-6 py-8 w-full" style="flex-grow: 1;">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="page-footer">
        TEG Stats &mdash; Golf tournament data since TEG 1
    </footer>

    <script>
    // Sticky nav that slides off screen after scrolling past threshold
    (function() {
        var nav = document.querySelector('.nav');
        var navHeight = nav.offsetHeight;
        var threshold = 300;
        nav.style.position = 'sticky';
        nav.style.top = '0';
        nav.style.transition = 'none';
        window.addEventListener('scroll', function() {
            var y = window.scrollY;
            if (y <= threshold) {
                nav.style.top = '0';
            } else {
                // Slide nav upward as you scroll past threshold
                var offset = Math.min(y - threshold, navHeight);
                nav.style.top = -offset + 'px';
            }
        }, { passive: true });
    })();
    </script>
</body>
</html>
