<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEG Stats{% block title_suffix %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        /* Table styling */
        .teg-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }
        .teg-table thead th {
            background-color: #f0fdf4;
            padding: 0.5rem 0.75rem;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #16a34a;
            white-space: nowrap;
        }
        .teg-table tbody td {
            padding: 0.4rem 0.75rem;
            border-bottom: 1px solid #e5e7eb;
            white-space: nowrap;
        }
        .teg-table tbody tr:hover {
            background-color: #f0fdf4;
        }
        .teg-table tbody tr.top-rank {
            background-color: #dcfce7;
            font-weight: 600;
        }
        .teg-table .total {
            font-weight: 700;
        }

        /* Records table styling */
        .records-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }
        .records-table thead th {
            background-color: #f0fdf4;
            padding: 0.5rem 0.75rem;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #16a34a;
        }
        .records-table tbody td {
            padding: 0.4rem 0.75rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .records-table tbody tr:hover {
            background-color: #f0fdf4;
        }

        /* HTMX loading indicator */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            display: inline-block;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-green-700 shadow-md">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex items-center justify-between h-14">
                <a href="/" class="text-white font-bold text-lg">TEG Stats</a>
                <div class="flex space-x-1">
                    <a href="/leaderboard"
                       class="px-3 py-2 rounded text-sm font-medium
                              {% if active_page == 'leaderboard' %}bg-green-900 text-white{% else %}text-green-100 hover:bg-green-600{% endif %}">
                        Leaderboard
                    </a>
                    <a href="/charts"
                       class="px-3 py-2 rounded text-sm font-medium
                              {% if active_page == 'charts' %}bg-green-900 text-white{% else %}text-green-100 hover:bg-green-600{% endif %}">
                        Charts
                    </a>
                    <a href="/records"
                       class="px-3 py-2 rounded text-sm font-medium
                              {% if active_page == 'records' %}bg-green-900 text-white{% else %}text-green-100 hover:bg-green-600{% endif %}">
                        Records
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="max-w-6xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
