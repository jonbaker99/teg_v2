{% extends "base.html" %}

{% block page_title %}
<div class="page-title-area">
    <span class="page-label">Scoring</span>
    <h1 class="page-title">Eagles / Birdies / Pars</h1>
</div>
{% endblock %}

{% block content %}

<div class="section-controls flex items-center gap-4">
    <div class="toggle-group flex items-center gap-2" style="margin-bottom: 0;">
        {% for st in score_types %}
        <button class="tab-underline sb-score{% if st == score_type %} tab-underline--active{% endif %}"
                hx-get="/scoring/birdies/tab"
                hx-target="#sb-content"
                hx-include="#sb-tab-input"
                hx-vals='{"score_type": "{{ st }}"}'
                hx-swap="innerHTML"
                onclick="
                    document.getElementById('sb-score-type').value='{{ st }}';
                    this.parentElement.querySelectorAll('.sb-score').forEach(b => b.classList.remove('tab-underline--active'));
                    this.classList.add('tab-underline--active');
                ">
            {{ st }}
        </button>
        {% endfor %}
    </div>
</div>

<div class="section-nav">
    {% for tab_id, tab_label in tabs %}
    <button class="tab-underline sb-tab{% if tab_id == active_tab %} tab-underline--active{% endif %}"
            hx-get="/scoring/birdies/tab"
            hx-target="#sb-content"
            hx-include="#sb-score-type"
            hx-vals='{"tab": "{{ tab_id }}"}'
            hx-swap="innerHTML"
            onclick="document.getElementById('sb-tab-input').value='{{ tab_id }}';">
        {{ tab_label }}
    </button>
    {% endfor %}
</div>

<input type="hidden" id="sb-score-type" name="score_type" value="{{ score_type }}">
<input type="hidden" id="sb-tab-input" name="tab" value="{{ active_tab }}">

<div id="sb-content" class="section-panel">
    {% include "partials/scoring_birdies_tab.html" %}
</div>
{% endblock %}
