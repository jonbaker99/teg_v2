{% extends "base.html" %}

{% block page_title %}
<div class="page-title-area">
    <span class="page-label">Scoring</span>
    <h1 class="page-title">Eagles / Birdies / Pars</h1>
</div>
{% endblock %}

{% block content %}

<div class="flex items-center gap-4 mb-4">
    <div class="tab-bar" style="margin-bottom: 0;">
        {% for st in score_types %}
        <button class="tab-underline {% if st == score_type %}active{% endif %}"
                onclick="document.getElementById('sb-score-type').value='{{ st }}';
                         htmx.trigger(document.getElementById('sb-tab-select'), 'change')">
            {{ st }}
        </button>
        {% endfor %}
    </div>
</div>

<input type="hidden" id="sb-score-type" name="score_type" value="{{ score_type }}">

<div class="tab-bar">
    {% for tab_id, tab_label in tabs %}
    <button id="sb-tab-select" class="tab-underline {% if tab_id == active_tab %}active{% endif %}"
            hx-get="/scoring/birdies/tab"
            hx-target="#sb-content"
            hx-include="#sb-score-type"
            hx-vals='{"tab": "{{ tab_id }}"}'
            hx-swap="innerHTML">
        {{ tab_label }}
    </button>
    {% endfor %}
</div>

<div id="sb-content">
    {% include "partials/scoring_birdies_tab.html" %}
</div>
{% endblock %}
