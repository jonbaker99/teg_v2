{% extends "base.html" %}

{% block page_title %}
<div class="page-title-area">
    <span class="page-label">Scorecards</span>
    <h1 class="page-title">Best / Worstball</h1>
</div>
{% endblock %}

{% block content %}

<div class="section-controls flex items-center gap-4">
    <div class="section-nav" style="margin-bottom: 0;">
        <button class="tab-underline{% if active_mode == 'bestball' %} tab-underline--active{% endif %}"
                hx-get="/bestball/content?mode=bestball"
                hx-target="#bb-content"
                hx-include="#bb-teg, #bb-sort, #bb-n"
                hx-swap="innerHTML"
                onclick="document.getElementById('bb-mode').value='bestball';">
            Bestball
        </button>
        <button class="tab-underline{% if active_mode == 'worstball' %} tab-underline--active{% endif %}"
                hx-get="/bestball/content?mode=worstball"
                hx-target="#bb-content"
                hx-include="#bb-teg, #bb-sort, #bb-n"
                hx-swap="innerHTML"
                onclick="document.getElementById('bb-mode').value='worstball';">
            Worstball
        </button>
    </div>

    <select id="bb-teg" class="theme-select" name="teg"
            hx-get="/bestball/content"
            hx-target="#bb-content"
            hx-include="#bb-mode, #bb-sort, #bb-n"
            hx-swap="innerHTML">
        <option value="0" {% if selected_teg == 0 %}selected{% endif %}>All TEGs</option>
        {% for t in teg_numbers %}
        <option value="{{ t }}" {% if t == selected_teg %}selected{% endif %}>TEG {{ t }}</option>
        {% endfor %}
    </select>

    <select id="bb-sort" class="theme-select" name="sort_best"
            hx-get="/bestball/content"
            hx-target="#bb-content"
            hx-include="#bb-mode, #bb-teg, #bb-n"
            hx-swap="innerHTML">
        <option value="true" {% if sort_best %}selected{% endif %}>Best First</option>
        <option value="false" {% if not sort_best %}selected{% endif %}>Worst First</option>
    </select>

    <input type="number" id="bb-n" class="theme-select" name="n"
           min="1" max="100" step="1" value="{{ n_rows if n_rows > 0 else 3 }}"
           style="width:5rem;"
           hx-get="/bestball/content"
           hx-target="#bb-content"
           hx-include="#bb-mode, #bb-teg, #bb-sort"
           hx-swap="innerHTML"
           hx-trigger="change, keyup changed delay:500ms"
           title="Rows to show (1–100)">

    <input type="hidden" id="bb-mode" name="mode" value="{{ active_mode }}">
</div>

<div id="bb-content" class="section-panel">
    {% include "partials/bestball_content.html" %}
</div>
{% endblock %}
