{% extends "base.html" %}

{% block extra_head %}
<link rel="stylesheet" href="/static/scorecard.css?v=19">
{% endblock %}

{% block page_title %}
<div class="page-title-area">
    <span class="page-label">Latest TEG</span>
    <h1 class="page-title">Latest TEG in Context</h1>
</div>
{% endblock %}

{% block content %}

<div class="section-controls flex items-center gap-4">
    <select id="lt-teg-select" class="theme-select"
            hx-get="/latest-teg/tab"
            hx-target="#lt-content"
            hx-include="#lt-tab-input"
            name="teg">
        {% for t in teg_numbers %}
        <option value="{{ t }}" {% if t == selected_teg %}selected{% endif %}>TEG {{ t }}</option>
        {% endfor %}
    </select>
    <input type="hidden" id="lt-tab-input" name="tab" value="{{ active_tab }}">
</div>

<div class="section-nav">
    {% for tab_id, tab_label in tabs %}
    <button class="tab-underline{% if tab_id == active_tab %} tab-underline--active{% endif %}"
            onclick="document.getElementById('lt-tab-input').value='{{ tab_id }}';
                     htmx.trigger(document.getElementById('lt-teg-select'), 'change')">
        {{ tab_label }}
    </button>
    {% endfor %}
</div>

<div id="lt-content" class="section-panel">
    {% include "partials/latest_teg_tab.html" %}
</div>
{% endblock %}
