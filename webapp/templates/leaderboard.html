{% extends "base.html" %}
{% block title_suffix %} — Leaderboard{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl heading">Leaderboard</h1>
    <div class="flex items-center gap-3">
        <label for="teg-select" class="text-sm font-medium text-secondary">TEG:</label>
        <select id="teg-select" name="teg"
                hx-get="/leaderboard/table"
                hx-target="#tables"
                hx-include="#lb-tab-input"
                hx-indicator="#loading"
                class="teg-select">
            {% for t in teg_numbers %}
            <option value="{{ t }}" {% if t == selected_teg %}selected{% endif %}>TEG {{ t }}</option>
            {% endfor %}
        </select>
        <span id="loading" class="htmx-indicator">
            <svg class="animate-spin h-5 w-5 accent-spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
        </span>
    </div>
</div>

<!-- Tab buttons -->
<div class="flex flex-wrap gap-2 mb-4">
    <input type="hidden" id="lb-tab-input" name="tab" value="{{ active_lb_tab }}">
    {% for tab_id, tab_label in leaderboard_tabs %}
    <button class="tab-underline{% if tab_id == active_lb_tab %} tab-underline--active{% endif %}"
            onclick="document.getElementById('lb-tab-input').value='{{ tab_id }}'"
            hx-get="/leaderboard/table"
            hx-target="#tables"
            hx-include="#teg-select"
            hx-vals='{"tab": "{{ tab_id }}"}'
            hx-indicator="#loading">
        {{ tab_label }}
    </button>
    {% endfor %}
</div>

<div id="tables">
    {% include "partials/leaderboard_table.html" %}
</div>
{% endblock %}
