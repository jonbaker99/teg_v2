{% extends "base.html" %}
{% block title_suffix %} — Leaderboard{% endblock %}

{% block page_title %}
<div class="page-title-area">
    <span class="page-label">Latest TEG</span>
    <h1 class="page-title">Leaderboard</h1>
</div>
{% endblock %}

{% block content %}

<div class="section-controls flex items-center gap-4">
    <select id="lb-teg-select" class="theme-select"
            hx-get="/leaderboard/table"
            hx-target="#lb-content"
            hx-include="#lb-tab-input, #lb-chart-variant"
            name="teg">
        {% for t in teg_numbers %}
        <option value="{{ t }}" {% if t == selected_teg %}selected{% endif %}>TEG {{ t }}</option>
        {% endfor %}
    </select>

    <input type="hidden" id="lb-tab-input" name="tab" value="{{ active_lb_tab }}">

    <div class="section-nav" style="margin-bottom: 0;">
        {% for tab_id, tab_label in leaderboard_tabs %}
        <button class="tab-underline{% if tab_id == active_lb_tab %} tab-underline--active{% endif %}"
                onclick="document.getElementById('lb-tab-input').value='{{ tab_id }}';
                         document.querySelectorAll('.section-nav button.tab-underline').forEach(b => b.classList.remove('tab-underline--active'));
                         this.classList.add('tab-underline--active');
                         htmx.trigger(document.getElementById('lb-teg-select'), 'change')">
            {{ tab_label }}
        </button>
        {% endfor %}
    </div>
</div>

<div id="lb-content" class="section-panel">
    {% include "partials/leaderboard_table.html" %}
</div>
{% endblock %}
